<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOH COFFEE | Command Center Pro V2</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1DB954">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+Ethiopic:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root { 
            --spotify-green: #1DB954; 
            --card-bg: rgba(20, 20, 20, 0.4); 
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            font-family: 'Inter', 'Noto Sans Ethiopic', sans-serif; 
            color: #fff; background-color: #000;
            margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden;
        }

        .video-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; z-index: -1; filter: brightness(0.2) contrast(1.2);
        }

        #app-container {
            min-height: 100vh; padding: 20px;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            margin: 0 auto;
        }

        .phone-mode {
            max-width: 400px !important; height: 850px;
            margin: 20px auto !important; border-radius: 40px;
            border: 12px solid #111; box-shadow: 0 0 50px rgba(0,0,0,0.8);
            overflow-y: auto; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(20px);
        }

        .glass-panel {
            background: var(--card-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px;
        }

        /* Smooth Card Intro Animation */
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .order-card {
            background: rgba(24, 24, 24, 0.8); border-radius: 20px;
            padding: 20px; border: 1px solid var(--glass-border);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            opacity: 0; /* Starts hidden for animation */
            animation: slideUpFade 0.6s forwards;
        }
        .order-card:hover { border-color: var(--spotify-green); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(29, 185, 84, 0.1); }

        .map-frame { height: 150px; width: 100%; border-radius: 16px; margin: 12px 0; border: 1px solid rgba(255,255,255,0.05); }

        .control-bar {
            background: rgba(0,0,0,0.5); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; z-index: 50; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .action-btn {
            background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 99px;
            font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 8px;
        }
        .action-btn:active { transform: scale(0.95); }

        .tab-btn {
            padding: 10px 20px; font-size: 11px; font-weight: 900;
            text-transform: uppercase; border-radius: 99px; cursor: pointer; transition: 0.3s;
        }
        .tab-active { background: var(--spotify-green); color: black; box-shadow: 0 0 15px rgba(29, 185, 84, 0.4); }

        .payment-preview { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; border: 2px solid var(--glass-border); cursor: pointer; transition: 0.3s; }
        .payment-preview:hover { transform: scale(1.1); border-color: var(--spotify-green); }
        
        /* Needs verification pulse */
        .needs-verify .payment-preview { border-color: #f97316; box-shadow: 0 0 15px rgba(249, 115, 22, 0.5); }

        /* Payment Modal Styling */
        #payment-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 200; backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center;
        }

        #calc-app {
            position: fixed; bottom: 20px; right: 20px; width: 300px; z-index: 100;
            transform: translateY(150%); opacity: 0; transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        #calc-app.show { transform: translateY(0); opacity: 1; }
        
        input, select, textarea {
            background: rgba(0,0,0,0.5) !important; border: 1px solid var(--glass-border) !important;
            border-radius: 12px !important; padding: 12px !important; color: white !important;
        }

        /* Dispatch Vehicle Buttons */
        .vehicle-btn {
            background: linear-gradient(145deg, rgba(30,30,30,1) 0%, rgba(15,15,15,1) 100%);
            border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease;
        }
        .vehicle-btn:hover { border-color: var(--spotify-green); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(29, 185, 84, 0.2); }
        .vehicle-btn i { transition: 0.3s; }
        .vehicle-btn:hover i { color: var(--spotify-green); transform: scale(1.2); }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-bg">
        <source src="background-video.mp4" type="video/mp4">
    </video>

    <div id="payment-modal" onclick="this.style.display='none'">
        <div class="relative max-w-[90%] max-h-[90%] flex flex-col items-center">
            <img id="modal-img" src="" class="max-h-[70vh] rounded-3xl shadow-2xl border-4 border-[#1DB954] transition-transform scale-95 animate-[pulse_2s_ease-in-out_infinite]">
            <p class="text-center mt-6 font-black uppercase tracking-widest text-white bg-black/50 px-6 py-2 rounded-full border border-white/10"><i class="fa-solid fa-xmark mr-2 text-[#1DB954]"></i> Close Receipt</p>
        </div>
    </div>

    <div class="control-bar">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-wifi text-xs text-[#1DB954]"></i>
            <span id="clock" class="text-xs font-bold font-mono">00:00:00</span>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleDeviceView()" class="action-btn hover:bg-white/20"><i class="fa-solid fa-mobile-screen"></i> <span>VIEW</span></button>
            <button onclick="toggleCalculator()" class="action-btn hover:bg-white/20"><i class="fa-solid fa-calculator"></i> <span>CALC</span></button>
            <button onclick="toggleLanguage()" class="action-btn bg-white text-black hover:bg-gray-200"><i class="fa-solid fa-language"></i> <span id="lang-label">EN/አማ</span></button>
        </div>
    </div>

    <div id="app-container" class="max-w-6xl">
        <header class="py-10">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="text-center md:text-left">
                    <h1 class="text-4xl md:text-5xl font-900 tracking-tighter italic" data-i18n="welcome">WELCOME MOH COFFEE CENTER</h1>
                    <p class="text-gray-400 text-[10px] uppercase font-bold tracking-widest mt-2" data-i18n="systemLive"><span class="text-[#1DB954] animate-pulse">●</span> System Live & Secure</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass-panel p-4 min-w-[120px] text-center border-b-2 border-b-[#1DB954]">
                        <p class="text-[9px] font-black text-gray-500 uppercase" data-i18n="revenue">Revenue</p>
                        <span id="sales" class="text-xl font-black text-[#1DB954]">0</span><span class="text-[10px] ml-1">ETB</span>
                    </div>
                    <div class="glass-panel p-4 min-w-[120px] text-center">
                        <p class="text-[9px] font-black text-gray-500 uppercase" data-i18n="orders">Orders</p>
                        <span id="totalOrders" class="text-xl font-black">0</span>
                    </div>
                </div>
            </div>
        </header>

        <nav class="flex gap-4 mb-8 border-b border-white/10 pb-4 overflow-x-auto no-scrollbar">
            <button onclick="switchTab('orders')" id="btn-orders" class="tab-btn tab-active" data-i18n="tabOrders"><i class="fa-solid fa-layer-group mr-2"></i>Orders</button>
            <button onclick="switchTab('fleet')" id="btn-fleet" class="tab-btn text-gray-400 hover:text-white" data-i18n="tabFleet"><i class="fa-solid fa-truck-fast mr-2"></i>Logistics</button>
            <button onclick="switchTab('freezone')" id="btn-freezone" class="tab-btn text-gray-400 hover:text-white" data-i18n="tabFree"><i class="fa-solid fa-book mr-2"></i>Order Log</button>
        </nav>

        <main id="orders-section">
            <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-20"></div>
        </main>

        <main id="fleet-section" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="glass-panel p-8 h-fit">
                    <h2 class="text-xl font-black mb-6 uppercase"><i class="fa-solid fa-user-plus text-[#1DB954] mr-2"></i> Hire Courier</h2>
                    <div class="space-y-4">
                        <input type="text" id="fName" placeholder="Full Name" class="w-full">
                        <input type="tel" id="fPhone" placeholder="Phone Number" class="w-full">
                        <select id="fType" class="w-full">
                            <option value="Bicycle">Bicycle (Short Distances)</option>
                            <option value="Motor">Motorbike (Long Distances)</option>
                        </select>
                        <div class="p-4 border border-white/10 rounded-xl bg-black/30">
                            <p class="text-[9px] font-black text-gray-500 mb-2 uppercase">Profile Photo</p>
                            <input type="file" id="fPhoto" accept="image/*" class="text-xs">
                        </div>
                        <button onclick="registerCourier()" class="w-full bg-[#1DB954] text-black py-4 rounded-xl font-black uppercase shadow-[0_0_15px_rgba(29,185,84,0.3)] hover:scale-[1.02] transition-transform">Add to Fleet</button>
                    </div>
                </div>
                <div class="lg:col-span-2 glass-panel p-8">
                    <h2 class="text-xl font-black mb-6 uppercase"><i class="fa-solid fa-users-viewfinder text-[#1DB954] mr-2"></i> Active Couriers (<span id="fleetCount">0</span>)</h2>
                    <div id="fleet-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </div>
        </main>

        <main id="freezone-section" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass-panel p-8">
                    <h2 class="text-xl font-black mb-6 uppercase">Manual Order Log</h2>
                    <textarea id="logText" class="w-full h-48 mb-4" placeholder="Write custom orders or notes here..."></textarea>
                    <button onclick="saveLog()" class="w-full bg-white text-black py-4 rounded-xl font-black uppercase hover:bg-gray-200">Save Note</button>
                </div>
                <div class="glass-panel p-8">
                    <h2 class="text-xl font-black mb-6 uppercase">Saved Archive</h2>
                    <div id="log-list" class="space-y-3"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="calc-app" class="glass-panel p-5 shadow-[0_20px_50px_rgba(0,0,0,0.9)]">
        <input type="text" id="calc-display" class="w-full bg-black/50 text-right text-2xl p-3 rounded-xl mb-4 font-mono" disabled value="0">
        <div class="grid grid-cols-4 gap-2">
            <button class="bg-white/10 p-4 rounded-xl hover:bg-white/20 transition-colors" onclick="calcAction('7')">7</button>
            <button class="bg-white/10 p-4 rounded-xl hover:bg-white/20 transition-colors" onclick="calcAction('8')">8</button>
            <button class="bg-white/10 p-4 rounded-xl hover:bg-white/20 transition-colors" onclick="calcAction('9')">9</button>
            <button class="bg-[#1DB954] text-black font-bold p-4 rounded-xl hover:bg-[#1ed760] transition-colors" onclick="calcAction('/')">÷</button>
            <button class="bg-white/10 p-4 rounded-xl hover:bg-white/20 transition-colors" onclick="calcAction('4')">4</button>
            <button class="bg-white/10 p-4 rounded-xl hover:bg-white/20 transition-colors" onclick="calcAction('5')">5</button>
            <button class="bg-white/10 p-4 rounded-xl hover:bg-white/20 transition-colors" onclick="calcAction('6')">6</button>
            <button class="bg-[#1DB954] text-black font-bold p-4 rounded-xl hover:bg-[#1ed760] transition-colors" onclick="calcAction('*')">×</button>
            <button class="bg-white/10 p-4 rounded-xl hover:bg-white/20 transition-colors" onclick="calcAction('1')">1</button>
            <button class="bg-white/10 p-4 rounded-xl hover:bg-white/20 transition-colors" onclick="calcAction('2')">2</button>
            <button class="bg-white/10 p-4 rounded-xl hover:bg-white/20 transition-colors" onclick="calcAction('3')">3</button>
            <button class="bg-[#1DB954] text-black font-bold p-4 rounded-xl hover:bg-[#1ed760] transition-colors" onclick="calcAction('-')">-</button>
            <button class="bg-white/10 p-4 rounded-xl hover:bg-white/20 transition-colors" onclick="calcAction('0')">0</button>
            <button class="bg-red-500/20 text-red-500 p-4 rounded-xl hover:bg-red-500/40 transition-colors" onclick="calcAction('clear')">C</button>
            <button class="bg-[#1DB954] text-black font-bold p-4 rounded-xl hover:bg-[#1ed760] transition-colors" onclick="calcAction('=')">=</button>
            <button class="bg-[#1DB954] text-black font-bold p-4 rounded-xl hover:bg-[#1ed760] transition-colors" onclick="calcAction('+')">+</button>
        </div>
    </div>

    <script type="module">
        // ==========================================
        // 1. AUTO-UPDATE VERSION BUSTER (Solves Phone Cache)
        // Change this number every time you push to GitHub!
        const APP_VERSION = "2.0"; 
        if (localStorage.getItem('moh_center_v') !== APP_VERSION) {
            localStorage.setItem('moh_center_v', APP_VERSION);
            console.log("New code detected. Forcing clean reload.");
            window.location.reload(true);
        }
        // ==========================================

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjtvENDE6JD2gntFdTMuljt8ojaLyW_lg",
            authDomain: "moh-coffe.firebaseapp.com",
            databaseURL: "https://moh-coffe-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "moh-coffe",
            appId: "1:257455436275:web:b6af25bbc61803b7a02286"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const MOH_HUB = [8.9865, 38.8340];
        let globalFleet = {};

        // --- UI & TRANSLATION FUNCTIONS ---
        let lang = 'en';
        const dict = {
            'en': { welcome: "WELCOME MOH COFFEE CENTER", revenue: "Revenue", orders: "Orders", tabOrders: "Orders Feed", tabFleet: "Logistics", tabFree: "Order Log", systemLive: "System Live & Secure" },
            'am': { welcome: "እንኳን ወደ ሞህ ማዕከል መጡ", revenue: "ገቢ", orders: "ትዕዛዞች", tabOrders: "ዝርዝር", tabFleet: "መጓጓዣ", tabFree: "ማስታወሻ", systemLive: "ሲስተሙ ይሰራል" }
        };

        window.toggleLanguage = () => {
            lang = lang === 'en' ? 'am' : 'en';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const icon = el.innerHTML.match(/<i.*<\/i>/);
                el.innerHTML = (icon ? icon[0] + ' ' : '') + dict[lang][el.getAttribute('data-i18n')];
            });
        };

        window.viewPayment = (imgUrl) => {
            document.getElementById('modal-img').src = imgUrl;
            document.getElementById('payment-modal').style.display = 'flex';
        };

        window.toggleDeviceView = () => document.getElementById('app-container').classList.toggle('phone-mode');
        window.toggleCalculator = () => document.getElementById('calc-app').classList.toggle('show');
        
        window.switchTab = (t) => {
            ['orders', 'fleet', 'freezone'].forEach(tab => {
                document.getElementById(`${tab}-section`).classList.toggle('hidden', tab !== t);
                const btn = document.getElementById(`btn-${tab}`);
                if(tab === t) {
                    btn.classList.add('tab-active'); btn.classList.remove('text-gray-400');
                } else {
                    btn.classList.remove('tab-active'); btn.classList.add('text-gray-400');
                }
            });
        };

        let val = "0";
        window.calcAction = (a) => {
            const disp = document.getElementById('calc-display');
            if(a === 'clear') val = "0";
            else if(a === '=') try { val = eval(val).toString(); } catch { val = "Error"; }
            else { val = val === "0" ? a : val + a; }
            disp.value = val;
        };

        // --- FLEET MANAGEMENT ---
        window.registerCourier = () => {
            const name = document.getElementById('fName').value;
            const phone = document.getElementById('fPhone').value;
            const type = document.getElementById('fType').value;
            const file = document.getElementById('fPhoto').files[0];
            if(!name || !phone || !file) return alert("Please fill Name, Phone, and Photo");

            const reader = new FileReader();
            reader.onload = () => {
                push(ref(db, 'fleet'), { name, phone, type, photo: reader.result });
                document.getElementById('fName').value = ''; document.getElementById('fPhone').value = '';
            };
            reader.readAsDataURL(file);
        };

        onValue(ref(db, 'fleet'), (s) => {
            const list = document.getElementById('fleet-list'); list.innerHTML = '';
            globalFleet = s.val() || {};
            document.getElementById('fleetCount').innerText = Object.keys(globalFleet).length;
            Object.keys(globalFleet).forEach(id => {
                const f = globalFleet[id];
                const icon = f.type === 'Motor' ? '<i class="fa-solid fa-motorcycle"></i>' : '<i class="fa-solid fa-bicycle"></i>';
                list.innerHTML += `
                    <div class="bg-black/40 p-4 rounded-2xl border border-white/5 flex items-center gap-4 hover:border-white/20 transition-colors">
                        <img src="${f.photo}" class="w-[50px] h-[50px] rounded-xl object-cover border-2 border-white/10">
                        <div class="flex-1">
                            <p class="font-black uppercase text-xs">${f.name}</p>
                            <p class="text-[10px] text-gray-400 font-bold">${icon} ${f.type}</p>
                        </div>
                        <button onclick="remove(ref(db, 'fleet/${id}'))" class="text-red-500/30 hover:text-red-500 transition-colors text-lg"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
            });
        });

        // --- ORDERS & SMART WORKFLOW ---
        onValue(ref(db, 'orders'), (s) => {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            const data = s.val();
            let totalRev = 0; let totalOrd = 0;
            if(!data) return;

            let cardIndex = 0;
            Object.keys(data).reverse().forEach(id => {
                const o = data[id];
                totalOrd++;
                // If it is completely new, default to "Pending"
                const currentStatus = o.status || "Pending"; 
                
                if(currentStatus === "Paid" || currentStatus === "Dispatched") totalRev += Number(o.price);

                const mapId = `map-${id}`;
                const paymentImg = o.payment_screenshot || 'https://via.placeholder.com/300x500/1DB954/000000?text=NO+RECEIPT';

                // 1. Dynamic Status Badge
                let statusBadge = '';
                let isNeedsVerify = false;
                if(currentStatus === "Pending") {
                    statusBadge = `<span class="text-[9px] font-black px-2 py-1 rounded bg-orange-500/20 border border-orange-500 text-orange-400 uppercase animate-pulse"><i class="fa-solid fa-clock mr-1"></i> Verify Payment</span>`;
                    isNeedsVerify = true;
                } else if(currentStatus === "Paid") {
                    statusBadge = `<span class="text-[9px] font-black px-2 py-1 rounded bg-[#1DB954]/20 border border-[#1DB954] text-[#1DB954] uppercase"><i class="fa-solid fa-check mr-1"></i> Approved - Needs Dispatch</span>`;
                } else {
                    statusBadge = `<span class="text-[9px] font-black px-2 py-1 rounded bg-blue-500/20 border border-blue-500 text-blue-400 uppercase"><i class="fa-solid fa-motorcycle mr-1"></i> Dispatched</span>`;
                }

                // 2. Dynamic Action Area (Approve vs Dispatch vs Dispatched Info)
                let actionHTML = '';
                if (currentStatus === "Pending") {
                    actionHTML = `
                        <button onclick="approvePayment('${id}')" class="w-full bg-orange-500 hover:bg-orange-400 text-black py-3 rounded-xl font-black text-xs mb-2 uppercase transition-colors shadow-[0_0_15px_rgba(249,115,22,0.4)]">
                            <i class="fa-solid fa-check-double mr-2"></i> Approve Payment
                        </button>
                    `;
                } else if (currentStatus === "Paid") {
                    actionHTML = `
                        <p class="text-[9px] text-gray-400 font-black uppercase mb-2 text-center tracking-widest border-t border-white/10 pt-4">Assign Logistics</p>
                        <div class="grid grid-cols-2 gap-3 mb-2">
                            <button onclick="dispatchOrder('${id}', 'Bicycle')" class="vehicle-btn flex flex-col items-center justify-center py-4 rounded-xl">
                                <i class="fa-solid fa-person-biking text-3xl text-gray-400 mb-2"></i>
                                <span class="text-[10px] font-black uppercase text-gray-300">Bicycle</span>
                            </button>
                            <button onclick="dispatchOrder('${id}', 'Motor')" class="vehicle-btn flex flex-col items-center justify-center py-4 rounded-xl">
                                <i class="fa-solid fa-motorcycle text-3xl text-gray-400 mb-2"></i>
                                <span class="text-[10px] font-black uppercase text-gray-300">Motorbike</span>
                            </button>
                        </div>
                    `;
                } else if (currentStatus === "Dispatched") {
                    actionHTML = `
                        <div class="bg-black/40 border border-[#1DB954]/30 rounded-xl p-3 mb-2 flex items-center gap-3">
                            <img src="${o.courier_photo}" class="w-[40px] h-[40px] rounded-lg border border-[#1DB954] object-cover">
                            <div>
                                <p class="text-[8px] text-[#1DB954] font-black uppercase tracking-widest">En Route with</p>
                                <p class="text-xs font-bold uppercase">${o.courier_name}</p>
                            </div>
                        </div>
                    `;
                }

                // Build Card
                grid.innerHTML += `
                    <div class="order-card" style="animation-delay: ${cardIndex * 0.05}s">
                        <div class="flex justify-between items-center mb-3">
                            ${statusBadge}
                            <span class="text-[9px] text-gray-500 font-mono">${new Date(o.timestamp || Date.now()).toLocaleTimeString()}</span>
                        </div>
                        
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h3 class="text-lg font-black uppercase leading-tight">${o.item}</h3>
                                <p class="text-[10px] text-gray-400 font-bold">${o.variant}</p>
                            </div>
                            <div class="text-right">
                                <div class="text-xl font-black text-[#1DB954]">${o.price}</div>
                                <div class="text-[8px] text-gray-500 font-bold uppercase">ETB</div>
                            </div>
                        </div>
                        
                        <div id="${mapId}" class="map-frame"></div>
                        
                        <div class="bg-black/40 p-3 rounded-xl mb-4 border border-white/5 flex items-center justify-between ${isNeedsVerify ? 'needs-verify' : ''}">
                            <div>
                                <p class="text-[9px] text-gray-500 uppercase font-black mb-1"><i class="fa-regular fa-user"></i> Customer</p>
                                <p class="text-xs font-bold mb-1">${o.customer}</p>
                                <p class="text-[9px] text-blue-400 italic"><i class="fa-solid fa-location-dot"></i> ${o.location}</p>
                            </div>
                            <div class="text-center flex flex-col items-center">
                                <img src="${paymentImg}" onclick="viewPayment('${paymentImg}')" class="payment-preview">
                                <p class="text-[8px] font-black mt-2 uppercase ${isNeedsVerify ? 'text-orange-400' : 'text-gray-400'}"><i class="fa-solid fa-magnifying-glass"></i> View Proof</p>
                            </div>
                        </div>

                        ${actionHTML}
                        
                        <button onclick="deleteOrder('${id}')" class="w-full text-red-500/50 hover:text-red-500 text-[9px] font-bold uppercase tracking-widest mt-2 transition-colors py-2"><i class="fa-solid fa-trash-can mr-1"></i> Archive Order</button>
                    </div>`;
                
                cardIndex++;
                setTimeout(() => initOrderMap(mapId), 50);
            });
            
            document.getElementById('sales').innerText = totalRev.toLocaleString();
            document.getElementById('totalOrders').innerText = totalOrd;
        });

        // Map setup
        function initOrderMap(id) {
            const map = L.map(id, {zoomControl:false, attributionControl:false}).setView(MOH_HUB, 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            const dest = [MOH_HUB[0]+(Math.random()-0.5)*0.03, MOH_HUB[1]+(Math.random()-0.5)*0.03];
            L.marker(MOH_HUB, {icon: L.divIcon({html:'<i class="fa-solid fa-mug-hot text-[#1DB954] text-lg drop-shadow-[0_0_5px_#1DB954]"></i>'})}).addTo(map);
            L.marker(dest, {icon: L.divIcon({html:'<i class="fa-solid fa-location-crosshairs text-blue-400 text-lg drop-shadow-[0_0_5px_#60a5fa]"></i>'})}).addTo(map);
            L.polyline([MOH_HUB, dest], {color: '#1DB954', weight: 2, opacity: 0.5, dashArray: '4, 8'}).addTo(map);
            map.fitBounds([MOH_HUB, dest], {padding: [10, 10]});
        }

        // Action 1: Approve Payment
        window.approvePayment = (id) => {
            update(ref(db, `orders/${id}`), { status: "Paid" });
        };

        // Action 2: Dispatch Order via Vehicle Image Buttons
        window.dispatchOrder = (id, type) => {
            // Find a courier of this type
            const courier = Object.values(globalFleet).find(f => f.type === type);
            if(!courier) {
                alert(`⚠️ You don't have any active ${type} couriers in your Fleet. Go to Logistics to hire one.`);
                return;
            }
            
            update(ref(db, `orders/${id}`), {
                status: "Dispatched",
                courier_name: courier.name,
                courier_photo: courier.photo 
            });
        };

        // Standard Logs and Deletion
        window.saveLog = () => {
            const text = document.getElementById('logText').value;
            if(!text) return;
            push(ref(db, 'logs'), { text, time: new Date().toLocaleString() });
            document.getElementById('logText').value = '';
        };

        onValue(ref(db, 'logs'), (s) => {
            const list = document.getElementById('log-list'); list.innerHTML = '';
            const data = s.val();
            if(data) Object.keys(data).reverse().forEach(id => {
                list.innerHTML += `<div class="bg-black/30 p-4 rounded-xl border border-white/5 flex justify-between items-center"><div class="text-[10px]"><b>${data[id].time}</b><br><span class="text-xs text-gray-300 mt-1 block">${data[id].text}</span></div><button onclick="remove(ref(db, 'logs/${id}'))" class="text-red-500/30 hover:text-red-500 text-lg"><i class="fa-solid fa-trash"></i></button></div>`;
            });
        });

        window.deleteOrder = (id) => { if(confirm("Archive this order?")) remove(ref(db, `orders/${id}`)); };
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
